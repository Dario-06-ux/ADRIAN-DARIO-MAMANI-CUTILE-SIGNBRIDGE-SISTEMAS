# deploy.yml · Auto-deploy to GitHub Pages on push to main
# UNIFRANZ 2026 · Adrián Darío Mamani Cutile
# ============================================================

name: Deploy SignBridge AI Landing Page

on:
  push:
    branches:
      - main
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Build & Validate ──────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          echo "✅ Checking project structure..."
          test -f index.html        && echo "  ✓ index.html found"
          test -f assets/css/style.css    && echo "  ✓ style.css found"
          test -f assets/css/animations.css && echo "  ✓ animations.css found"
          test -f assets/css/responsive.css && echo "  ✓ responsive.css found"
          test -f assets/js/main.js       && echo "  ✓ main.js found"
          test -f assets/js/particles.js  && echo "  ✓ particles.js found"
          test -f assets/js/animations.js && echo "  ✓ animations.js found"
          test -f assets/js/form.js       && echo "  ✓ form.js found"
          test -f assets/img/logo.svg     && echo "  ✓ logo.svg found"
          test -f sitemap.xml             && echo "  ✓ sitemap.xml found"
          test -f robots.txt              && echo "  ✓ robots.txt found"
          echo "✅ All required files present!"

      - name: Check encoding (UTF-8)
        run: |
          echo "Checking file encodings..."
          file index.html
          file assets/css/style.css

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'

  # ── Deploy ───────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        run: |
          echo "🚀 SignBridge AI deployed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📅 Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "SignBridge AI · UNIFRANZ 2026"
          echo "Adrián Darío Mamani Cutile"
